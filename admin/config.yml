backend:
  name: Food-Kiosk-Demo

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "content/home.json"
        fields:
          - { label: "Hero Eyebrow", name: "heroEyebrow", widget: "string" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Description", name: "heroDescription", widget: "text" }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string" }
          - { label: "TikTok URL", name: "tiktokUrl", widget: "string" }
          - { label: "About Title", name: "aboutTitle", widget: "string" }
          - { label: "About Description", name: "aboutDescription", widget: "text" }

  - name: "menu"
    label: "Menu"
    files:
      - label: "Menu Items"
        name: "menu"
        file: "content/menu.json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Item Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Price", name: "price", widget: "string" }